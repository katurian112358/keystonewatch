name: Nightly Data Fetch

on:
  schedule:
    - cron: "0 7 * * *"  # 2am ET = 7am UTC
  workflow_dispatch:      # Manual trigger via GitHub UI

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    # Hard cap on the whole job. Steady-state runs take ~1-2h; the first run is
    # larger. Keep under GitHub's 6h ceiling.
    timeout-minutes: 350
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pipeline/requirements.txt

      - name: Install pipeline dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run data pipeline
        # Step-level timeout (shorter than the job) so that if the pipeline runs
        # long, it gets cut off here but the commit step below still runs and saves
        # whatever data was written incrementally to disk.
        timeout-minutes: 300
        continue-on-error: true
        env:
          OPENSTATES_API_KEY: ${{ secrets.OPENSTATES_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CIVIC_API_KEY: ${{ secrets.GOOGLE_CIVIC_API_KEY }}
          LEGISCAN_API_KEY: ${{ secrets.LEGISCAN_API_KEY }}
        working-directory: pipeline
        run: python run_pipeline.py

      - name: Commit updated data files
        # Always run — commit whatever data was fetched, even on partial/failed runs.
        if: always()
        run: |
          git config user.name "keystonewatch-bot"
          git config user.email "bot@keystonewatch"
          git add data/
          git diff --cached --quiet || git commit -m "chore: nightly data refresh [$(date -u +%Y-%m-%dT%H:%MZ)]"
          git push

      - name: Trigger Vercel redeploy
        if: always()
        run: |
          if [ -n "${{ secrets.VERCEL_DEPLOY_HOOK }}" ]; then
            curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          fi
